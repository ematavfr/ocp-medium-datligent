apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    app: {{ .Release.Name }}-frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-frontend
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-frontend
    spec:
      volumes:
        - name: next-cache
          emptyDir: {}
      containers:
        - name: frontend
          image: {{ .Values.frontend.image }}
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_URL
              value: "https://backend-{{ .Release.Namespace }}.{{ .Values.global.domain }}"
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          volumeMounts:
            - name: next-cache
              mountPath: /app/.next
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 30
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: {{ .Release.Name }}-frontend
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Release.Name }}-frontend
spec:
  host: frontend-{{ .Release.Namespace }}.{{ .Values.global.domain }}
  to:
    kind: Service
    name: {{ .Release.Name }}-frontend
  port:
    targetPort: 3000
  tls:
    termination: edge
